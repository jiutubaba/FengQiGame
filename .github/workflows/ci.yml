name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: 文档、单元测试、构建与依赖审计
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: 安装依赖
        run: npm ci
      - name: 运行项目检查
        run: npm run check
      - name: 审计生产依赖
        run: npm run audit:prod

  integration:
    name: 隔离 PostgreSQL 集成测试
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: fengqi_test
          POSTGRES_USER: fengqi_ci
          POSTGRES_PASSWORD: ci-only-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fengqi_ci -d fengqi_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://fengqi_ci:ci-only-password@127.0.0.1:5432/fengqi_test
      COOKIE_SECURE: "false"
      LOG_LEVEL: silent
    steps:
      - name: 检出源码
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 配置 Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
      - name: 安装依赖
        run: npm ci
      - name: 运行隔离集成测试
        run: npm run test:integration
